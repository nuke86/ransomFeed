    <script>
      function adaptiveColor(
        hex,
        darkColor = "#000000",
        lightColor = "#FFFFFF"
      ) {
        if (hex.indexOf("#") === 0) {
          hex = hex.slice(1);
        }
        // convert 3-digit hex to 6-digits.
        if (hex.length === 3) {
          hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
        }
        if (hex.length !== 6) {
          throw new Error("Invalid HEX color.");
        }
        let r = parseInt(hex.slice(0, 2), 16),
          g = parseInt(hex.slice(2, 4), 16),
          b = parseInt(hex.slice(4, 6), 16);

        return r * 0.299 + g * 0.587 + b * 0.114 > 186 ? darkColor : lightColor;
      }

      var regex = /((([a-zA-Z]+(-[a-zA-Z0-9]+){0,2})|\*)(;q=[0-1](\.[0-9]+)?)?)*/g;

      var isString = function (s) {
        return typeof s === "string";
      };

      function parse(al) {
        var strings = (al || "").match(regex);
        return strings
          .map(function (m) {
            if (!m) {
              return;
            }

            var bits = m.split(";");
            var ietf = bits[0].split("-");
            var hasScript = ietf.length === 3;

            return {
              code: ietf[0],
              script: hasScript ? ietf[1] : null,
              region: hasScript ? ietf[2] : ietf[1],
              quality: bits[1] ? parseFloat(bits[1].split("=")[1]) : 1.0,
            };
          })
          .filter(function (r) {
            return r;
          })
          .sort(function (a, b) {
            return b.quality - a.quality;
          });
      }

      function pick(supportedLanguages, acceptLanguage, options) {
        options = options || {};

        if (
          !supportedLanguages ||
          !supportedLanguages.length ||
          !acceptLanguage
        ) {
          return null;
        }

        if (isString(acceptLanguage)) {
          acceptLanguage = parse(acceptLanguage);
        }

        var supported = supportedLanguages.map(function (support) {
          var bits = support.split("-");
          var hasScript = bits.length === 3;

          return {
            code: bits[0],
            script: hasScript ? bits[1] : null,
            region: hasScript ? bits[2] : bits[1],
          };
        });

        for (var i = 0; i < acceptLanguage.length; i++) {
          var lang = acceptLanguage[i];
          var langCode = lang.code.toLowerCase();
          var langRegion = lang.region
            ? lang.region.toLowerCase()
            : lang.region;
          var langScript = lang.script
            ? lang.script.toLowerCase()
            : lang.script;
          for (var j = 0; j < supported.length; j++) {
            var supportedCode = supported[j].code.toLowerCase();
            var supportedScript = supported[j].script
              ? supported[j].script.toLowerCase()
              : supported[j].script;
            var supportedRegion = supported[j].region
              ? supported[j].region.toLowerCase()
              : supported[j].region;
            if (
              langCode === supportedCode &&
              (options.loose ||
                !langScript ||
                langScript === supportedScript) &&
              (options.loose || !langRegion || langRegion === supportedRegion)
            ) {
              return supportedLanguages[j];
            }
          }
        }

      function translate(browserLanguages) {
        if (rtlLanguages.indexOf(browserLanguages[0].code) !== -1) {
          document.body.setAttribute("dir", "rtl");
        } else {
          document.body.setAttribute("dir", "ltr");
        }

        browserLanguages.reverse().forEach((lang, idx) => {
          if (typeof translations[lang.code] !== "undefined") {
            var languageMap = translations[lang.code];

            for (const [key, value] of Object.entries(languageMap)) {
              translationMap[key] = value;
            }
          }
        });

        for (const key in translationMap) {
          if (translationMap.hasOwnProperty(key)) {
            const replace = translationMap[key];
            Array.from(
              document.getElementsByClassName("js-lang-" + key)
            ).forEach(function (element) {
              if (element) {
                element.innerHTML = replace;
              }

              if (element.value) {
                element.value = replace;
              }
            });
          }
        }
      }
